<script>
// ===== STATO =====
let todos = [];
let arnie = [];        // per il collegamento arnia
let _vista = 'scadenza';
let _glanceFiltro = null;   // null | 'scaduto' | 'scadenza' | 'futuro'
let _checklistTempM = [];

// Categorie (allineate a js/todo.js dell'app principale)
const TODO_CATEGORIE = [
  { id: 'trattamento',    label: '💊 Trattamento',    color: '#8A2C2C' },
  { id: 'controllo',      label: '🔍 Controllo',      color: '#2C5F8A' },
  { id: 'manutenzione',   label: '🔧 Manutenzione',   color: '#5C3A10' },
  { id: 'amministrazione',label: '📄 Amministrazione', color: '#6B4A20' },
  { id: 'acquisto',       label: '🛒 Acquisto',       color: '#4A7C3F' },
  { id: 'altro',          label: '📋 Altro',          color: '#8B5E2A' },
];
const PRIORITA_ORD = { urgente: 0, alta: 1, media: 2, bassa: 3 };

// ===== HELPER =====
function escM(s) {
  if(s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if(!iso) return '';
  const d = new Date(iso);
  if(isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit' });
}
function statoScad(scad) {
  if(!scad) return 'nessuna';
  const oggi = new Date(); oggi.setHours(0,0,0,0);
  const d = new Date(scad); d.setHours(0,0,0,0);
  if(isNaN(d.getTime())) return 'nessuna';
  const diff = Math.round((d - oggi) / 86400000);
  if(diff < 0) return 'scaduto';
  if(diff <= 10) return 'scadenza';   // range 10 giorni (oggi incluso)
  return 'futuro';
}
function isOggi(scad) {
  if(!scad) return false;
  const oggi = new Date(); oggi.setHours(0,0,0,0);
  const d = new Date(scad); d.setHours(0,0,0,0);
  return d.getTime() === oggi.getTime();
}
function ordina(arr) {
  return arr.slice().sort((a,b) => {
    const pa = PRIORITA_ORD[a.priorita] ?? 9, pb = PRIORITA_ORD[b.priorita] ?? 9;
    if(pa !== pb) return pa - pb;
    return (a.scadenza||'9999').localeCompare(b.scadenza||'9999');
  });
}

// ===== LOGIN / LOADING =====
function showLoadingScreen(msg) {
  document.getElementById('driveLoginScreen').style.display = 'flex';
  document.getElementById('driveLoginScreen').innerHTML =
    `<div class="spinner"></div><h2 style="color:var(--brown)">${msg}</h2><p style="color:var(--text-light)">Connessione a Google Drive...</p>`;
}
function showLoginScreen() {
  document.getElementById('driveLoginScreen').style.display = 'flex';
  document.getElementById('driveLoginScreen').innerHTML = `
    <div class="bee">📋</div>
    <h2>Connetti Google Drive</h2>
    <p>Accedi con il tuo account Google per vedere le cose da fare dell'apiario.</p>
    <button class="btn-google" onclick="driveLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Accedi con Google
    </button>`;
}

// ===== DRIVE INIT =====
window.addEventListener('load', () => {
  setTimeout(() => {
    initDrive(
      async () => {
        showLoadingScreen('🔄 Caricamento...');
        try {
          const db = await driveReadFile(FILENAME_DB);
          if(db && db.arnie) arnie = db.arnie;
          const t = await driveReadFile(FILENAME_TODO);
          if(t && Array.isArray(t.todos)) todos = t.todos;
        } catch(e) { console.error('[Todo PWA] Errore caricamento:', e); }
        showApp();
      },
      () => showLoadingScreen('🔄 Caricamento...'),
      () => showLoginScreen()
    );
  }, 600);
});

function showApp() {
  document.getElementById('driveLoginScreen').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
  document.getElementById('addBar').style.display = 'block';
  document.getElementById('driveDot').classList.add('connected');
  // popola categoria modale
  document.getElementById('categoriaM').innerHTML = TODO_CATEGORIE.map(c => `<option value="${c.id}">${c.label}</option>`).join('');
  // data odierna nel sottotitolo
  const oggi = new Date().toLocaleDateString('it-IT', { day:'numeric', month:'long' });
  document.getElementById('headerSub').textContent = 'Il tuo apiario · ' + oggi;
  render();
}

// ===== RENDER =====
function attivi() { return todos.filter(t => t.stato !== 'fatto'); }

function render() {
  try {
    const act = attivi();
    // Conteggi colpo d'occhio
    const nScad = act.filter(t => statoScad(t.scadenza) === 'scaduto').length;
    const nScadenza = act.filter(t => statoScad(t.scadenza) === 'scadenza').length;
    const nFut = act.filter(t => statoScad(t.scadenza) === 'futuro').length;
    document.getElementById('numScaduti').textContent = nScad;
    document.getElementById('numScadenza').textContent = nScadenza;
    document.getElementById('numFuturi').textContent = nFut;

    // Evidenzia card filtro attiva
    document.getElementById('gcScaduti').classList.toggle('sel', _glanceFiltro === 'scaduto');
    document.getElementById('gcScadenza').classList.toggle('sel', _glanceFiltro === 'scadenza');
    document.getElementById('gcFuturi').classList.toggle('sel', _glanceFiltro === 'futuro');

    // Banner filtro
    const fa = document.getElementById('filtroAttivo');
    if(_glanceFiltro) {
      const lab = { scaduto: '🔴 Solo scaduti', scadenza: '🟠 Solo in scadenza (10 giorni)', futuro: '📆 Solo futuri' }[_glanceFiltro];
      document.getElementById('filtroAttivoLabel').textContent = lab;
      fa.style.display = 'flex';
    } else {
      fa.style.display = 'none';
    }

    // Filtra items
    let items = act;
    if(_glanceFiltro) items = items.filter(t => statoScad(t.scadenza) === _glanceFiltro);

    const cont = document.getElementById('listaTodo');
    if(items.length === 0) {
      const msg = todos.length === 0 ? 'Nessun compito ancora.<br>Aggiungine uno!' : 'Nessun compito per questo filtro.';
      cont.innerHTML = `<div class="empty"><span class="big">📋</span>${msg}</div>`;
      return;
    }

    const gruppi = _vista === 'scadenza' ? raggruppaScadenza(items) : raggruppaCategoria(items);
    cont.innerHTML = gruppi.map(g => g.items.length === 0 ? '' :
      `<div class="cat-block">
        <div class="cat-head" style="border-color:${g.color||'var(--cream-dark)'}">
          <span class="cat-name" style="color:${g.color||'var(--brown)'}">${g.label}</span>
          <span class="cat-cnt">${g.items.length}</span>
        </div>
        ${g.items.map(renderCard).join('')}
      </div>`).join('');
  } catch(err) {
    console.error('[Todo PWA] Errore render:', err.message);
  }
}

function raggruppaScadenza(items) {
  const map = { scaduto: [], scadenza: [], futuro: [], nessuna: [] };
  items.forEach(t => { map[statoScad(t.scadenza)].push(t); });
  const out = [];
  if(map.scaduto.length) out.push({ label: '🔴 Scaduti', color: '#C0392B', items: ordina(map.scaduto) });
  if(map.scadenza.length) out.push({ label: '🟠 In scadenza (10 giorni)', color: '#9A6B00', items: ordina(map.scadenza) });
  if(map.futuro.length) out.push({ label: '📆 Futuri', color: 'var(--blue)', items: ordina(map.futuro) });
  if(map.nessuna.length) out.push({ label: '📋 Senza scadenza', color: 'var(--brown)', items: ordina(map.nessuna) });
  return out;
}
function raggruppaCategoria(items) {
  return TODO_CATEGORIE.map(c => ({
    label: c.label, color: c.color,
    items: ordina(items.filter(t => (t.categoria||'altro') === c.id))
  })).filter(g => g.items.length > 0);
}

function renderCard(t) {
  const cat = TODO_CATEGORIE.find(c => c.id === (t.categoria||'altro')) || TODO_CATEGORIE[5];
  const prioClass = t.priorita === 'urgente' ? 'urg' : (t.priorita === 'alta' ? 'alta' : '');
  const st = statoScad(t.scadenza);

  let scadHtml = '';
  if(t.scadenza) {
    const cls = st === 'scaduto' ? 'scaduto' : (isOggi(t.scadenza) ? 'oggi' : '');
    const txt = st === 'scaduto' ? 'Scad. ' + fmtDate(t.scadenza) : (isOggi(t.scadenza) ? 'Oggi' : fmtDate(t.scadenza));
    scadHtml = `<span class="tag tag-scad ${cls}">📅 ${txt}</span>`;
  }
  let arniaHtml = '';
  if(t.arniaId) {
    const a = arnie.find(x => x.id === t.arniaId);
    if(a) arniaHtml = `<span class="tag tag-arnia">🏠 #${a.num}</span>`;
  }
  // categoria mostrata solo in vista per scadenza (in vista categoria è già il titolo del gruppo)
  const catHtml = _vista === 'scadenza' ? `<span class="tag" style="background:${cat.color}20;color:${cat.color}">${cat.label}</span>` : '';

  // Checklist
  const hasChecklist = Array.isArray(t.checklist) && t.checklist.length > 0;
  let progHtml = '', clBlock = '';
  if(hasChecklist) {
    const fatti = t.checklist.filter(c => c.fatto).length;
    progHtml = ` <span class="cl-prog">· ${fatti}/${t.checklist.length}</span>`;
    clBlock = `<div class="cl-mini">` + t.checklist.map((c, i) =>
      `<div class="cl-row ${c.fatto?'done':''}" onclick="event.stopPropagation();toggleChecklist('${t.id}',${i})">
        <div class="cl-box ${c.fatto?'done':''}">${c.fatto?'✓':''}</div><span>${escM(c.testo)}</span>
      </div>`).join('') + `</div>`;
  }

  return `
    <div class="todo ${prioClass}">
      <div class="check" onclick="event.stopPropagation();toggleFatto('${t.id}')"></div>
      <div class="todo-body" onclick="openTodoModalM('${t.id}')">
        <div class="todo-testo">${escM(t.testo)}${progHtml}</div>
        <div class="todo-meta">${catHtml}${arniaHtml}${scadHtml}</div>
        ${clBlock}
      </div>
      <button class="todo-del" onclick="deleteTodoM('${t.id}')">🗑</button>
    </div>`;
}

// ===== VISTA / FILTRI =====
function setVista(v) {
  _vista = v;
  document.getElementById('vistaScadenza').classList.toggle('on', v === 'scadenza');
  document.getElementById('vistaCategoria').classList.toggle('on', v === 'categoria');
  render();
}
function toggleGlanceFiltro(f) {
  _glanceFiltro = (_glanceFiltro === f) ? null : f;
  render();
}
function clearGlanceFiltro() { _glanceFiltro = null; render(); }

// ===== AZIONI =====
async function persisti() {
  try {
    await driveWriteFile(FILENAME_TODO, { version: 1, savedAt: new Date().toISOString(), todos });
  } catch(e) {
    console.error('[Todo PWA] Errore salvataggio:', e);
    toast('⚠️ Errore salvataggio');
  }
}
function toggleFatto(id) {
  todos = todos.map(t => t.id !== id ? t : {
    ...t, stato: t.stato === 'fatto' ? 'da_fare' : 'fatto',
    dataCompletamento: t.stato === 'fatto' ? null : new Date().toISOString()
  });
  render(); persisti();
  const t = todos.find(x => x.id === id);
  if(t && t.stato === 'fatto') toast('✅ Completato');
}
function toggleChecklist(todoId, idx) {
  todos = todos.map(t => {
    if(t.id !== todoId || !Array.isArray(t.checklist)) return t;
    return { ...t, checklist: t.checklist.map((c,i) => i===idx ? {...c, fatto: !c.fatto} : c) };
  });
  render(); persisti();
}
function deleteTodoM(id) {
  if(!confirm('Eliminare questo compito?')) return;
  todos = todos.filter(t => t.id !== id);
  render(); persisti();
  toast('🗑 Eliminato');
}

// ===== MODALE =====
function openTodoModalM(id) {
  _checklistTempM = [];
  // arnie
  const selA = document.getElementById('arniaM');
  const arnieSorted = [...arnie].filter(a=>!a.annoDismissione).sort((a,b)=>(parseInt(a.num)||0)-(parseInt(b.num)||0));
  selA.innerHTML = '<option value="">— Nessuna —</option>' + arnieSorted.map(a => `<option value="${a.id}">🏠 #${a.num}${a.nome?' '+escM(a.nome):''}</option>`).join('');

  if(id && typeof id === 'string') {
    const t = todos.find(x => x.id === id);
    if(t) {
      document.getElementById('modalTitleM').textContent = '✏️ Modifica compito';
      document.getElementById('editIdM').value = id;
      document.getElementById('testoM').value = t.testo || '';
      document.getElementById('categoriaM').value = t.categoria || 'altro';
      document.getElementById('prioritaM').value = t.priorita || 'media';
      document.getElementById('scadenzaM').value = t.scadenza || '';
      selA.value = t.arniaId || '';
      document.getElementById('noteM').value = t.note || '';
      document.getElementById('articoloIdM').value = t.articoloId || '';
      _checklistTempM = Array.isArray(t.checklist) ? t.checklist.map(c => ({...c})) : [];
    }
  } else {
    document.getElementById('modalTitleM').textContent = '📋 Nuovo compito';
    document.getElementById('editIdM').value = '';
    document.getElementById('testoM').value = '';
    document.getElementById('categoriaM').value = 'altro';
    document.getElementById('prioritaM').value = 'media';
    document.getElementById('scadenzaM').value = '';
    selA.value = '';
    document.getElementById('noteM').value = '';
    document.getElementById('articoloIdM').value = '';
  }
  renderChecklistEditorM();
  document.getElementById('checklistInputM').value = '';
  document.getElementById('todoModalM').classList.add('open');
}
function closeTodoModalM() { document.getElementById('todoModalM').classList.remove('open'); }

function renderChecklistEditorM() {
  const c = document.getElementById('checklistEditorM');
  if(_checklistTempM.length === 0) { c.innerHTML = ''; return; }
  c.innerHTML = _checklistTempM.map((it, i) =>
    `<div class="cl-edit-row">
      <div class="cl-box ${it.fatto?'done':''}" onclick="toggleChecklistTempM(${i})">${it.fatto?'✓':''}</div>
      <span style="flex:1${it.fatto?';text-decoration:line-through;opacity:0.6':''}">${escM(it.testo)}</span>
      <button class="todo-del" onclick="rimuoviChecklistM(${i})">✕</button>
    </div>`).join('');
}
function aggiungiChecklistM() {
  const inp = document.getElementById('checklistInputM');
  const v = inp.value.trim();
  if(!v) return;
  _checklistTempM.push({ testo: v, fatto: false });
  inp.value = '';
  renderChecklistEditorM();
  inp.focus();
}
function rimuoviChecklistM(i) { _checklistTempM.splice(i,1); renderChecklistEditorM(); }
function toggleChecklistTempM(i) { if(_checklistTempM[i]) { _checklistTempM[i].fatto = !_checklistTempM[i].fatto; renderChecklistEditorM(); } }

function saveTodoM() {
  try {
    const testo = document.getElementById('testoM').value.trim();
    if(!testo) { alert('Scrivi cosa fare'); return; }
    const editId = document.getElementById('editIdM').value;
    const entry = {
      testo,
      categoria: document.getElementById('categoriaM').value,
      priorita: document.getElementById('prioritaM').value,
      scadenza: document.getElementById('scadenzaM').value,
      arniaId: document.getElementById('arniaM').value || null,
      articoloId: document.getElementById('articoloIdM').value || null,
      note: document.getElementById('noteM').value.trim(),
      checklist: _checklistTempM.map(c => ({ testo: c.testo, fatto: !!c.fatto })),
    };
    if(editId) {
      todos = todos.map(t => t.id === editId ? { ...t, ...entry } : t);
    } else {
      todos.push({
        id: Date.now().toString() + Math.random().toString(36).slice(2),
        ...entry, stato: 'da_fare',
        dataCreazione: new Date().toISOString(), dataCompletamento: null,
      });
    }
    closeTodoModalM();
    render(); persisti();
    toast('✅ Salvato');
  } catch(err) {
    console.error('[Todo PWA] Errore saveTodoM:', err.message);
    alert('Errore nel salvataggio.');
  }
}

// ===== TOAST =====
let _toastTimer;
function toast(msg) {
  const t = document.getElementById('toastM');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
